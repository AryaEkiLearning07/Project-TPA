<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo_TPA.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Platform DayCare Ubaya</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Nunito", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 10% 14%, rgba(255, 108, 182, 0.35), transparent 46%),
          radial-gradient(circle at 90% 10%, rgba(132, 100, 255, 0.3), transparent 40%),
          radial-gradient(circle at 75% 85%, rgba(255, 165, 218, 0.3), transparent 46%),
          linear-gradient(180deg, #fff6fd 0%, #f9f1ff 34%, #f8ecff 100%);
        color: #2f2144;
      }

      .boot-loader {
        min-height: 100vh;
        padding: 20px;
        display: grid;
        place-items: center;
      }

      .boot-loader__card {
        width: min(100%, 440px);
        padding: 24px;
        border-radius: 24px;
        border: 1px solid rgba(233, 211, 246, 0.96);
        background:
          radial-gradient(circle at 10% 15%, rgba(255, 120, 191, 0.2), rgba(255, 120, 191, 0) 34%),
          radial-gradient(circle at 88% 12%, rgba(124, 104, 255, 0.16), rgba(124, 104, 255, 0) 34%),
          linear-gradient(160deg, rgba(255, 255, 255, 0.96), rgba(249, 242, 255, 0.94));
        box-shadow:
          0 30px 60px -42px rgba(95, 53, 151, 0.72),
          0 16px 30px -28px rgba(228, 62, 139, 0.32);
        display: grid;
        justify-items: center;
        gap: 16px;
        text-align: center;
      }

      .boot-loader__brand {
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .boot-loader__logo-shell {
        width: 96px;
        height: 96px;
        padding: 12px;
        border-radius: 20px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(250, 240, 255, 0.92));
        border: 1px solid rgba(220, 193, 242, 0.9);
        box-shadow: 0 16px 28px -24px rgba(88, 53, 146, 0.76);
      }

      .boot-loader__logo {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 14px;
      }

      .boot-loader__caption {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid rgba(228, 202, 244, 0.94);
        background: rgba(255, 248, 255, 0.84);
        color: #744e98;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .boot-loader__spinner {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 4px solid rgba(238, 227, 252, 0.92);
        border-top-color: #8d60dd;
        border-right-color: #ff5da8;
        animation: boot-spin 0.78s linear infinite;
      }

      .boot-loader__copy {
        display: grid;
        gap: 6px;
      }

      .boot-loader__copy h1 {
        margin: 0;
        font-size: clamp(22px, 3vw, 28px);
        line-height: 1.08;
      }

      .boot-loader__copy p {
        margin: 0;
        color: #654f82;
        line-height: 1.55;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <section class="boot-loader" role="status" aria-live="polite">
        <div class="boot-loader__card">
          <div class="boot-loader__brand">
            <span class="boot-loader__logo-shell">
              <img
                src="/logo_TPA.jpg"
                alt="Logo TPA Rumah Ceria UBAYA"
                class="boot-loader__logo"
              />
            </span>
            <span class="boot-loader__caption">TPA Rumah Ceria UBAYA</span>
          </div>
          <div class="boot-loader__spinner" aria-hidden="true"></div>
          <div class="boot-loader__copy">
            <h1>Sedang memuat platform</h1>
            <p>Mohon tunggu sebentar, dashboard sedang disiapkan untuk Anda.</p>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
