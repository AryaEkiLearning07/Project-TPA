<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe7f3" />
      <stop offset="100%" stop-color="#ffcce3" />
    </linearGradient>
    <clipPath id="logo-clip">
      <rect x="11" y="11" width="42" height="42" rx="10" ry="10" />
    </clipPath>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="16" ry="16" fill="url(#bg)" />
  <rect
    x="8"
    y="8"
    width="48"
    height="48"
    rx="12"
    ry="12"
    fill="#ffffff"
    stroke="#de3f88"
    stroke-opacity="0.62"
    stroke-width="1.5"
  />
  <image
    href="/logo_TPA.jpg"
    x="11"
    y="11"
    width="42"
    height="42"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#logo-clip)"
  />
</svg>
